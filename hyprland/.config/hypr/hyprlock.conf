# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

$font = IosevkaTermNerdFont

general {
  hide_cursor = true # Hides the cursor instead of making it visible
  ignore_empty_output = true # Skips validation when no password is provided
  immediate_render = false # Makes hyprlock immediately start to draw widgets. Backgrounds will render `background:color` until their `background:path` resource is available.
  text_trim = true # Sets if the text should be trimmed, useful to avoid trailing newline in command outputs.
  fractional_scaling = 2 # Whether to use fractional scaling. 0: disabled, 1: enabled, 2: auto.
  screencopy_mode = 0 # Selects screencopy mode. 0: GPU accelerated, 1: CPU accelerated (slow)
  fail_timeout = 2000 # Milliseconds until the UI resets after a failed auth attempt.
}

auth {
  pam {
    enabled = true # Whether to enable PAM authentication.
    module = hyprlock # Sets the PAM module used for authentication. If the module isn't found in /etc/pam.d, "su" will be used as a fallback.
  }
  fingerprint {
    enabled = false # Enables parallel fingerprint auth with fprintd.
    ready_message = (Scan fingerprint to unlock) # Sets the message that will be displayed when fprintd is ready to scan a fingerprint.
    present_image = Scanning fingerprint # Sets the message that will be displayed when a finger is placed on the scanner.
    retry_delay = 250 # Sets the delay in ms after an unrecognized finger is scanned before another finger can be scanned.
  }
}

animations {
  enabled = true # Whether to enable animations.
  bezier = linear, 1, 1, 0, 0
  animation = fadeIn, 1, 5, linear
  animation = fadeOut, 1, 5, linear
  animation = inputFieldDots, 1, 2, linear
}

background {
  monitor = # Monitor to draw on
  path = ~/Pictures/walls/angry-birds-bomb-minimal-5k-sa-1366x768.jpg # Image path, `screenshot` or empty to fill with `color`
  color = rgba(17,17,17,1.0) # Fallback background color
  blur_passes = 2 # The amount of passes to perform. 0 disables blurring.
  blur_size = 2 # Blur size (distance)
  noise = 0.0117 # How much noise to apply.
  contrast = 0.8916 # Contrast modulation for blur.
  brightness = 0.8172 # Brightness modulation for blur.
  vibrancy = 0.1696 # Increase saturation of blurred colors.
  vibrancy_darkness = 0.05 # How strong the effect of vibrancy is on dark areas.
  reload_time = -1 # Seconds between reloading, 0 to reload with SIGUSR2. Ignored if `path` is `screenshot`
  reload_cmd = # Command to get new path. If empty, old path will be used.
  crossfade_time = -1.0 # Cross-fade time in seconds between old and new background on reload. A negative value means no cross-fade.
  zindex = -1 # z-index of the widget.
}

input-field {
  monitor =
  size = 20%, 5%
  outline_thickness = 3
  inner_color = rgba(0, 0, 0, 0.0) # no fill

  outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
  check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
  fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

  font_color = rgb(143, 143, 143)
  fade_on_empty = false
  rounding = 15

  font_family = $font
  placeholder_text = Input password...
  fail_text = $PAMFAIL

  # uncomment if you wish to display a message during authentication
  check_text = Authenticating...

  # uncomment to use a letter instead of a dot to indicate the typed password
  # dots_text_format = *
  dots_size = 0.2
  dots_spacing = 0.3

  # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
  hide_input = false

  position = 0, -20
  halign = center
  valign = center
}

# TIME
label {
  monitor =
  text = cmd[update:1000] date +"%H:%M:%S" # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
  font_size = 90
  font_family = $font

  position = -30, 0
  halign = right
  valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
  font_size = 25
  font_family = $font

  position = -30, -150
  halign = right
  valign = top
}

