[general]
import=[]
working_directory="None" # Parent process directory will be used
live_config_reload=true
ipc_socket=true

[env]

[window]
dimensions={columns=0, lines=0}
position="None"
padding={x=0, y=0}
dynamic_padding=false
decorations="None"
opacity=0.75
blur=true
startup_mode="Windowed"
title="Alacritty"
dynamic_title=true
class={instance="Alacritty", general="Alacritty"}
decorations_theme_variant="None"
resize_increments=true
option_as_alt="Both"
level="Normal"

[scrolling]
history=10000
multiplier=3

[font]
normal={family="JetBrainsMono Nerd Font Mono", style="Regular"}
bold={family="JetBrainsMono Nerd Font Mono", style="Bold"}
italic={family="JetBrainsMono Nerd Font Mono", style="Italic"}
bold_italic={family="JetBrainsMono Nerd Font Mono", style="Bold Italic"}
size=12.0
offset={x=0,y=0}
glyph_offset={x=0,y=0}
builtin_box_drawing=true

[colors]
cursor={text="CellBackground", cursor="CellForeground"}
vi_mode_cursor={text="CellBackground", cursor="CellForeground"}
line_indicator={foreground="None", background="None"}
footer_bar={foreground="#181818", background="#d8d8d8"}
selection={text="CellBackground", background="CellForeground"}
indexed_colors=[]
transparent_background_colors=true
draw_bold_text_with_bright_colors=true

[colors.primary]
foreground="#d8d8d8"
background="#181818"
dim_foreground="#828482"
bright_foreground="None"

[colors.search]
matches={foreground="#181818", background="#ac4242"}
focused_match={foreground="#181818", background="#f4bf75"}

[colors.hints]
start={foreground="#181818", background="#f4bf75"}
end={foreground="#181818", background="#ac4242"}

[colors.normal]
black="#181818"
red="#ac4242"
green="#90a959"
yellow="#f4bf75"
blue="#6a9fb5"
magenta="#aa759f"
cyan="#75b5aa"
white="#d8d8d8"

[colors.bright]
black="#6b6b6b"
red="#c55555"
green="#aac474"
yellow="#feca88"
blue="#82b8c8"
magenta="#c28cb8"
cyan="#93d3c3"
white="#f8f8f8"

[colors.dim]
black="#0f0f0f"
red="#712b2b"
green="#5f6f3a"
yellow="#a17e4d"
blue="#456877"
magenta="#704d68"
cyan="#4d7770"
white="#8e8e8e"

[bell]
animation="Linear"
duration=0
color="#ffff00"
command="None"

[selection]
semantic_escape_chars=",│`|:\"' ()[]{}<>\t"
save_to_clipboard=false

[cursor]
style={shape="Block", blinking="Never"}
vi_mode_style={shape="Block", blinking="Never"}
blink_interval=750
blink_timeout=5
unfocused_hollow=true
thickness=0.15

[terminal]
osc52="OnlyCopy"

[mouse]
hide_when_typing=true
bindings=[
	{mouse="Right", mods="None", action="Paste"},
	{mouse="Right", mods="Control", action="ExpandSelection"},
	{mouse="Middle", mods="None", mode="~Vi", action="PasteSelection"}
]

[keyboard]
bindings=[
{key="Paste", action="Paste"},
{key="Copy", action="Copy"},
{key="L", mods="Control", action="ClearLogNotice"},
{key="Paste", mode="Vi|Search", action="Paste"},
{key="L", mods="Control", mode="~Vi|~Search", chars="\u000c"},
{key="PageUp", mods="Control|Shift", mode="~Alt", action="ScrollPageUp"},
{key="PageDown", mods="Control|Shift", mode="~Alt", action="ScrollPageDown"},
{key="Home", mods="Control|Shift", mode="~Alt", action="ScrollToTop"},
{key="End", mods="Control|Shift", mode="~Alt", action="ScrollToBottom"},
{key="Space", mods="Control|Shift", mode="~Search", action="ToggleViMode"},
{key="Space", mods="Control|Shift", mode="Vi|~Search", action="ScrollToBottom"},
{key="Escape", mode="Vi|~Search", action="ClearSelection"},
{key="I", mode="Vi|~Search", action="ToggleViMode"},
{key="I", mode="Vi|~Search", action="ScrollToBottom"},
{key="C", mods="Control", mode="Vi|~Search", action="ToggleViMode"},
{key="J", mods="Control|Shift", action="ScrollLineDown"},
{key="K", mods="Control|Shift", action="ScrollLineUp"},
]

[debug]
render_timer=false
persistent_logging=false
log_level="Warn"
renderer="None"
print_events=false
highlight_damage=false
prefer_egl=false
